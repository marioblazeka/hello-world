<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Web Stranica</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Font Awesome ikone -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .side-bar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100%;
            width: 70px;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        .side-bar a {
            color: white;
            font-size: 22px;
            margin: 15px 0;
            text-decoration: none;
        }

        .side-bar a:hover {
            color: #00aced;
        }

        .search-container {
            position: fixed;
            top: 20px;
            right: 20px;
        }

        .search-container input {
            padding: 5px;
        }

        .content {
            margin-left: 90px;
            padding: 20px;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="side-bar">

        <!-- Društvene mreže -->
        <a href="https://www.linkedin.com" target="_blank" aria-label="LinkedIn">
            <i class="fab fa-linkedin"></i>
        </a>

        <a href="https://www.facebook.com" target="_blank" aria-label="Facebook">
            <i class="fab fa-facebook"></i>
        </a>

        <a href="https://www.instagram.com" target="_blank" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
        </a>

        <a href="https://www.tiktok.com" target="_blank" aria-label="TikTok">
            <i class="fab fa-tiktok"></i>
        </a>

        <a href="https://www.youtube.com" target="_blank" aria-label="YouTube">
            <i class="fab fa-youtube"></i>
        </a>

        <a href="https://www.pinterest.com" target="_blank" aria-label="Pinterest">
            <i class="fab fa-pinterest"></i>
        </a>

        <a href="https://www.instructables.com" target="_blank" aria-label="Instructables">
            <i class="fas fa-tools"></i>
        </a>

    </div>

    <!-- Tražilica -->
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Pretraži...">
        <button onclick="searchPage()">Pretraži</button>
    </div>

    <!-- Sadržaj -->
    <div class="content">
        <h1>Dobrodošli na moju web stranicu</h1>
        <p>Ovdje se nalazi sadržaj koji se može pretraživati.</p>
        <p>Primjer teksta za testiranje tražilice.</p>
    </div>

    <!-- JavaScript za pretraživanje -->
    <script>
        function searchPage() {
            let input = document.getElementById("searchInput").value.toLowerCase();
            let content = document.querySelector(".content");
            let text = content.innerText.toLowerCase();

            if (text.includes(input)) {
                alert("Pronađen rezultat na stranici.");
            } else {
                alert("Nema rezultata.");
            }
        }
    </script>

</body>
</html>
